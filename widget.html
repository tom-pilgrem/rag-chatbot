<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIP Recruitment Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    #chat-container {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    #chat-header {
      background: #0F6E56;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    #chat-header .title { font-size: 15px; font-weight: 600; }
    #chat-header .subtitle { font-size: 12px; opacity: 0.8; margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Messages */
    #messages {
      flex: 1;
      height: 400px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message { display: flex; flex-direction: column; max-width: 82%; gap: 4px; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
    }

    .message.user .bubble {
      background: #0F6E56;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .timestamp {
      font-size: 11px;
      color: #999;
      padding: 0 4px;
    }

    /* Typing indicator */
    .typing-bubble {
      background: #f0f0f0;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* Suggestions */
    #suggestions {
      padding: 4px 20px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .suggestion {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1.5px solid #0F6E56;
      background: transparent;
      color: #0F6E56;
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion:hover { background: #0F6E56; color: #fff; }

    /* Input row */
    #input-row {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #user-input {
      flex: 1;
      font-size: 14px;
      border: 1.5px solid #ddd;
      border-radius: 999px;
      padding: 9px 16px;
      outline: none;
      transition: border 0.15s;
    }
    #user-input:focus { border-color: #0F6E56; }

    #send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #0F6E56;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #085041; }
    #send-btn svg { width: 16px; height: 16px; fill: #fff; }

    /* Footer */
    #chat-footer {
      padding: 8px 16px;
      text-align: center;
      font-size: 11px;
      color: #bbb;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
<body>

<div id="chat-container">

  <div id="chat-header">
    <div class="avatar">💼</div>
    <div>
      <div class="title">MIP Recruitment Assistant</div>
      <div class="subtitle">Ask me anything about the program</div>
    </div>
    <div class="status-dot"></div>
  </div>

  <div id="messages">
    <div class="message bot">
      <div class="bubble">Hi there! 👋 I can answer questions about MIP's Analytics Career Accelerator program — the application process, what to expect, salary, and more. What would you like to know?</div>
      <div class="timestamp">Just now</div>
    </div>
  </div>

  <div id="suggestions">
    <button class="suggestion" onclick="sendSuggestion(this.textContent)">How do I apply?</button>
    <button class="suggestion" onclick="sendSuggestion(this.textContent)">What's the salary?</button>
    <button class="suggestion" onclick="sendSuggestion(this.textContent)">Do you sponsor visas?</button>
    <button class="suggestion" onclick="sendSuggestion(this.textContent)">When's the next intake?</button>
  </div>

  <div id="input-row">
    <input id="user-input" type="text" placeholder="Ask a question..." autocomplete="off"
           onkeydown="if(event.key==='Enter') handleSend()"/>
    <button id="send-btn" onclick="handleSend()" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <div id="chat-footer">Powered by MIP · <a href="mailto:careers@mipaustralia.com.au" style="color:#0F6E56">careers@mipaustralia.com.au</a></div>

</div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const API_URL    = "http://localhost:8000/chat";   // change to your deployed URL later
  const SESSION_ID = "session_" + Math.random().toString(36).slice(2);

  // ── Helpers ───────────────────────────────────────────────────────────────
  function getTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function addMessage(role, text) {
    const messages = document.getElementById("messages");

    const wrapper = document.createElement("div");
    wrapper.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    const time = document.createElement("div");
    time.className = "timestamp";
    time.textContent = getTime();

    wrapper.appendChild(bubble);
    wrapper.appendChild(time);
    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const messages = document.getElementById("messages");
    const wrapper = document.createElement("div");
    wrapper.className = "message bot";
    wrapper.id = "typing";
    wrapper.innerHTML = '<div class="typing-bubble"><span></span><span></span><span></span></div>';
    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function handleSend() {
    const input    = document.getElementById("user-input");
    const question = input.value.trim();
    if (!question) return;

    input.value = "";
    document.getElementById("suggestions").style.display = "none";

    addMessage("user", question);
    showTyping();

    try {
      const response = await fetch(API_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ message: question, session_id: SESSION_ID }),
      });

      const data = await response.json();
      removeTyping();
      addMessage("bot", data.answer);

    } catch (err) {
      removeTyping();
      addMessage("bot", "Sorry, I couldn't reach the server. Please try again or email careers@mipaustralia.com.au");
    }
  }

  function sendSuggestion(text) {
    document.getElementById("user-input").value = text;
    handleSend();
  }
</script>

</body>
</html>
